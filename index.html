          var data = sessionStorage.getItem('iktracker_logout_transition');
          if (data) {
            var parsed = JSON.parse(data);
            // Only valid for 10 seconds
            if (Date.now() - parsed.timestamp < 10000) {
              document.write('<div id="logout-shell-overlay" class="logout-overlay"><div class="logout-content"><img src="/logo-iktracker-250.webp" alt="IKtracker" width="64" height="64"><h2>' + parsed.message + '</h2></div></div>');
            }
            sessionStorage.removeItem('iktracker_logout_transition');
          }
        } catch(e) {}
      })();
      // Detect when custom font is loaded, then swap
      if ('fonts' in document) {
        document.fonts.ready.then(function() {
          document.documentElement.classList.add('fonts-loaded');
        });
      } else {
        // Fallback for older browsers - swap after 100ms
        setTimeout(function() {
          document.documentElement.classList.add('fonts-loaded');
        }, 100);
      }
    </script>
  </head>
