<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <!-- Fond bleu dégradé -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a6cf7"/>
      <stop offset="100%" style="stop-color:#7c5cff"/>
    </linearGradient>
    
    <!-- Contour orange vers rouge -->
    <linearGradient id="borderGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
  </defs>
  
  <!-- Contour dégradé orange/rouge -->
  <circle cx="24" cy="24" r="21.5" fill="url(#borderGradient)"/>
  
  <!-- Fond bleu dégradé -->
  <circle cx="24" cy="24" r="18.5" fill="url(#bgGradient)"/>
  
  <!-- Traits de vitesse orange derrière la voiture -->
  <g stroke="#f97316" stroke-width="2" stroke-linecap="round" opacity="0.9">
    <line x1="6" y1="21" x2="12" y2="21"/>
    <line x1="7.5" y1="25.5" x2="15" y2="25.5"/>
    <line x1="6" y1="30" x2="10.5" y2="30"/>
  </g>
  
  <!-- Voiture orange -->
  <g transform="translate(12, 15)" fill="#f97316">
    <!-- Corps de la voiture -->
    <rect x="0" y="9" width="24" height="7.5" rx="1.5"/>
    <!-- Toit de la voiture -->
    <path d="M4.5 9 L7.5 3 L16.5 3 L19.5 9 Z"/>
    <!-- Fenêtres -->
    <path d="M8.25 4.5 L9.75 7.5 L14.25 7.5 L15.75 4.5 Z" fill="#4a6cf7" opacity="0.6"/>
    <!-- Roues -->
    <circle cx="6" cy="16.5" r="3" fill="#1e293b"/>
    <circle cx="18" cy="16.5" r="3" fill="#1e293b"/>
    <circle cx="6" cy="16.5" r="1.2" fill="#f97316"/>
    <circle cx="18" cy="16.5" r="1.2" fill="#f97316"/>
  </g>
  
  <!-- Badge notification rouge en haut à droite -->
  <circle cx="39" cy="9" r="7.5" fill="#ef4444"/>
  <circle cx="39" cy="9" r="6" fill="#ef4444" stroke="white" stroke-width="1.5"/>
  <text x="39" y="12.75" text-anchor="middle" fill="white" font-size="10.5" font-weight="bold" font-family="Arial, sans-serif">1</text>
</svg>
