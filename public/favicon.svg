<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Fond bleu dégradé (comme le bouton "nouveau trajet") -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a6cf7"/>
      <stop offset="100%" style="stop-color:#7c5cff"/>
    </linearGradient>
    
    <!-- Contour orange vers rouge -->
    <linearGradient id="borderGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
  </defs>
  
  <!-- Contour dégradé orange/rouge -->
  <circle cx="16" cy="16" r="14.5" fill="url(#borderGradient)"/>
  
  <!-- Fond bleu dégradé -->
  <circle cx="16" cy="16" r="12.5" fill="url(#bgGradient)"/>
  
  <!-- Traits de vitesse orange derrière la voiture -->
  <g stroke="#f97316" stroke-width="1.5" stroke-linecap="round" opacity="0.9">
    <line x1="4" y1="14" x2="8" y2="14"/>
    <line x1="5" y1="17" x2="10" y2="17"/>
    <line x1="4" y1="20" x2="7" y2="20"/>
  </g>
  
  <!-- Voiture orange -->
  <g transform="translate(8, 10)" fill="#f97316">
    <!-- Corps de la voiture -->
    <rect x="0" y="6" width="16" height="5" rx="1"/>
    <!-- Toit de la voiture -->
    <path d="M3 6 L5 2 L11 2 L13 6 Z"/>
    <!-- Fenêtres -->
    <path d="M5.5 3 L6.5 5 L9.5 5 L10.5 3 Z" fill="#4a6cf7" opacity="0.6"/>
    <!-- Roues -->
    <circle cx="4" cy="11" r="2" fill="#1e293b"/>
    <circle cx="12" cy="11" r="2" fill="#1e293b"/>
    <circle cx="4" cy="11" r="0.8" fill="#f97316"/>
    <circle cx="12" cy="11" r="0.8" fill="#f97316"/>
  </g>
  
  <!-- Badge notification rouge en haut à droite -->
  <circle cx="26" cy="6" r="5" fill="#ef4444"/>
  <circle cx="26" cy="6" r="4" fill="#ef4444" stroke="white" stroke-width="1"/>
  <text x="26" y="8.5" text-anchor="middle" fill="white" font-size="7" font-weight="bold" font-family="Arial, sans-serif">1</text>
</svg>