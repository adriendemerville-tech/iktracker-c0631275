<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#gradient)" stroke="#1e3a5f" stroke-width="1"/>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
  </defs>
  
  <!-- Car icon (simplified) -->
  <g transform="translate(6, 8)" fill="white">
    <!-- Car body -->
    <path d="M2 10h16v4H2z" fill="white"/>
    <path d="M4 6l2-3h8l2 3v4H4z" fill="white"/>
    <!-- Windows -->
    <path d="M5.5 4l1.5-2h6l1.5 2v2.5h-9z" fill="rgba(255,255,255,0.3)"/>
    <!-- Wheels -->
    <circle cx="5" cy="14" r="2" fill="#1e3a5f"/>
    <circle cx="15" cy="14" r="2" fill="#1e3a5f"/>
    <circle cx="5" cy="14" r="1" fill="#888"/>
    <circle cx="15" cy="14" r="1" fill="#888"/>
  </g>
  
  <!-- Red notification badge -->
  <circle cx="26" cy="6" r="5" fill="#ef4444" stroke="white" stroke-width="1.5"/>
</svg>